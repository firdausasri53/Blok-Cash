<!DOCTYPE html>
<html>
<head>
<title>Blok Blaze</title>
<style>
  body { background: #0f172a; color: #fff; text-align: center; }
  canvas { background: #1e293b; border: 2px solid #38bdf8; }
</style>
</head>
<body>
<h2>🔥 Blok Blaze</h2>
<div id="menu">
  <button onclick="mulai()">Mulai Game</button>
</div>
<canvas id="canvas" width="320" height="480" style="display:none;"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
let gameRunning = false;

function mulai() {
  document.getElementById("menu").style.display = "none";
  canvas.style.display = "block";
  gameRunning = true;
  loop();
}

function loop() {
  if(gameRunning) {
    ctx.clearRect(0,0,320,480);
    ctx.fillStyle = "#38bdf8";
    ctx.fillRect(100,100,120,20);
    requestAnimationFrame(loop);
  }
}
</script>
</body>
</html>
